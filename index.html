// Supabase API
const sb = {
  async req(table, method="GET", body=null, filter="") {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${filter}`, {
      method,
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        Prefer: method==="POST" ? "return=representation" : "",
      },
      body: body ? JSON.stringify(body) : null,
    });
    if (!r.ok) throw new Error(await r.text());
    return method==="DELETE" ? null : r.json();
  },
  get:(t,f="")=>sb.req(t,"GET",null,f),
  post:(t,b)=>sb.req(t,"POST",b),
  patch:(t,b,f)=>sb.req(t,"PATCH",b,f),
};

// ── Toast ─────────────────────────────────────────────────────────────────────
function Toast({msg}){
  if(!msg) return null;
  return <div style={{position:"fixed",bottom:30,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,#7c3aed,#db2777)",color:"#fff",fontWeight:700,fontSize:14,padding:"12px 28px",borderRadius:40,zIndex:9999,whiteSpace:"nowrap",boxShadow:"0 8px 30px rgba(124,58,237,0.5)",animation:"toastIn 0.3s ease"}}>{msg}</div>;
}

function App(){

  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState("");
  const [commission, setCommission] = useState(20);
  const [payModal, setPayModal] = useState(null);
  const [selectedCourse, setSelectedCourse] = useState(null);
  const [studentInfo, setStudentInfo] = useState({name:"",email:""});
  const [searchQ, setSearchQ] = useState("");
  const [filterCat, setFilterCat] = useState("All");
  const [adminTab, setAdminTab] = useState("dashboard");
  const [profTab, setProfTab] = useState("courses");
  const [newCourse, setNewCourse] = useState({title:"",description:"",category:CATS[0],level:LEVELS[0],price:"",lessons:"",hours:"",thumbnail:"📚",professor_name:""});

  const showToast = m => { setToast(m); setTimeout(()=>setToast(""),3000); };

  const loadData = async () => {
    try {
      setLoading(true);
      const [c,e] = await Promise.all([
        sb.get("courses","?order=created_at.desc"),
        sb.get("enrollments","?order=created_at.desc"),
      ]);
      setCourses(Array.isArray(c)?c:[]);
      setEnrollments(Array.isArray(e)?e:[]);
    } catch(err) {
      showToast("⚠️ DB Error: "+err.message);
    } finally { setLoading(false); }
  };

  useEffect(()=>{loadData();},[]);

  const approved = courses.filter(c=>c.status==="approved");
  const pending = courses.filter(c=>c.status==="pending");
  const confirmedEnroll = enrollments.filter(e=>e.payment_status==="confirmed");
  const totalRev = confirmedEnroll.reduce((s,e)=>s+Number(e.amount),0);
  const myComm = confirmedEnroll.reduce((s,e)=>s+(Number(e.amount)*Number(e.commission_pct)/100),0);

  const submitCourse = async () => {
    if(!newCourse.title||!newCourse.price||!newCourse.professor_name) return showToast("Sabhi * fields fill karo!");
    try {
      setLoading(true);
      await sb.post("courses",{...newCourse,price:Number(newCourse.price),lessons:Number(newCourse.lessons)||0,hours:Number(newCourse.hours)||0,status:"pending",students:0,rating:0});
      showToast("Course submitted! Admin approve karega ✅");
      setNewCourse({title:"",description:"",category:CATS[0],level:LEVELS[0],price:"",lessons:"",hours:"",thumbnail:"📚",professor_name:""});
      await loadData();
    } catch(e){ showToast("Error: "+e.message); }
    finally{ setLoading(false); }
  };

  const approveCourse = async id => {
    await sb.patch("courses",{status:"approved"},`?id=eq.${id}`);
    showToast("Approved! 🎉"); loadData();
  };
  const rejectCourse = async id => {
    await sb.patch("courses",{status:"rejected"},`?id=eq.${id}`);
    showToast("Rejected."); loadData();
  };

  const confirmEnrollment = async (upiRef, txnId) => {
    try {
      setLoading(true);
      await sb.post("enrollments",{
        course_id:payModal.id,
        student_name:studentInfo.name,
        student_email:studentInfo.email,
        amount:payModal.price,
        commission_pct:commission,
        commission_amt:payModal.price*commission/100,
        payment_status:"confirmed",
        upi_ref:upiRef,
        txn_id:txnId,
      });
      await sb.patch("courses",{students:(payModal.students||0)+1},`?id=eq.${payModal.id}`);
      setPayModal(null);
      setStudentInfo({name:"",email:""});
      showToast("Enrolled successfully! 🎓");
      await loadData();
      setView("student");
    } catch(e){ showToast("Error: "+e.message); }
    finally{ setLoading(false); }
  };

  const filtered = approved.filter(c=>{
    const q=searchQ.toLowerCase();
    return (filterCat==="All"||c.category===filterCat)&&(!q||c.title?.toLowerCase().includes(q)||c.professor_name?.toLowerCase().includes(q));

            <div style={{...s.title,fontSize:34,letterSpacing:-1}}>Learn<span style={{background:"linear-gradient(135deg,#a78bfa,#f472b6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Vibe</span></div>
          </div>
          <div style={{fontSize:12,color:"#444",letterSpacing:3,textTransform:"uppercase",fontWeight:600}}>Premium Learning Platform</div>
        </div>

        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:32}}>

      <Toast msg={toast}/>

  );

  // ── ADMIN ───────────────────────────────────────────────────────────────────
  if(view==="admin") return (
    <div style={s.page}>
      <div style={s.orb1}/>
      <div style={{...s.content,padding:"20px 20px 80px"}}>
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button style={{...s.btnSecondary,padding:"8px 12px",fontSize:12}} onClick={()=>setView("home")}>← Back</button>
            <div>
              <div style={{...s.title,fontSize:18}}>Admin Panel</div>
              <div style={{fontSize:11,color:"#444"}}>LearnVibe Owner</div>
            </div>
          </div>
          <div style={{background:"rgba(124,58,237,0.15)",border:"1px solid rgba(124,58,237,0.3)",borderRadius:12,padding:"8px 14px",textAlign:"center"}}>
            <div style={{fontSize:9,color:"#a78bfa",fontWeight:700}}>COMMISSION</div>
            <div style={{...s.title,fontSize:22,color:"#f472b6"}}>{commission}%</div>
          </div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:4,background:"rgba(255,255,255,0.03)",borderRadius:14,padding:4,marginBottom:20}}>
          {[["dashboard","📊","Dashboard"],["courses","📚","Courses"],["earnings","💰","Earnings"],["settings","⚙️","Settings"]].map(([id,icon,label])=>(
            <button key={id} onClick={()=>setAdminTab(id)} style={{flex:1,padding:"10px 4px",borderRadius:10,background:adminTab===id?"rgba(124,58,237,0.25)":"none",border:"none",color:adminTab===id?"#a78bfa":"#444",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:10,cursor:"pointer",transition:"all 0.2s"}}>
              <div style={{fontSize:16}}>{icon}</div>{label}

          ))}
        </div>

        {/* DASHBOARD */}
        {adminTab==="dashboard" && <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            {[[fmt(myComm),"My Commission","#a78bfa"],[fmt(totalRev-myComm),"Prof Revenue","#34d399"],[approved.length+" Courses","Live","#60a5fa"],[pending.length+" Pending","Review","#f59e0b"]].map(([v,l,c])=>(

          {pending.length>0 && <div style={{...s.card,padding:18,marginBottom:16}}>

            {pending.map(c=>(

          <div style={{...s.card,padding:18}}>

            {confirmedEnroll.length===0 ? <div style={{textAlign:"center",padding:20,color:"#333",fontSize:13}}>No transactions yet</div>

                  <div style={{fontSize:11,color:"#444",marginBottom:6}}>by {c.professor_name}</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{...s.chip,background:c.status==="approved"?"rgba(16,185,129,0.15)":c.status==="pending"?"rgba(245,158,11,0.15)":"rgba(239,68,68,0.15)",color:c.status==="approved"?"#34d399":c.status==="pending"?"#f59e0b":"#f87171"}}>{c.status}</span>
                    <span style={{...s.chip,background:"rgba(124,58,237,0.15)",color:"#a78bfa"}}>{c.category}</span>
                    <span style={{marginLeft:"auto",...s.title,fontSize:15}}>{fmt(c.price)}</span>
                  </div>
                  {c.status==="pending" && <div style={{display:"flex",gap:8,marginTop:10}}>
                    <button style={{...s.btnGreen,flex:1}} onClick={()=>approveCourse(c.id)}>✓ Approve</button>
                    <button style={{...s.btnRed,flex:1}} onClick={()=>rejectCourse(c.id)}>✗ Reject</button>
                  </div>}
                </div>
              </div>
            </div>
          ))}
        </>}

        {/* EARNINGS */}
        {adminTab==="earnings" && <>
          <div style={{...s.card,padding:24,marginBottom:16,textAlign:"center",background:"linear-gradient(135deg,rgba(124,58,237,0.2),rgba(219,39,119,0.2))"}}>
            <div style={{fontSize:11,color:"#666",fontWeight:700,letterSpacing:2,marginBottom:8}}>TOTAL COMMISSION EARNED</div>
            <div style={{...s.title,fontSize:42,background:"linear-gradient(135deg,#a78bfa,#f472b6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{fmt(myComm)}</div>
            <div style={{fontSize:12,color:"#444",marginTop:6}}>from {confirmedEnroll.length} confirmed enrollments</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            <div style={{...s.card,padding:16,textAlign:"center"}}>
              <div style={{...s.title,fontSize:18,color:"#fff"}}>{fmt(totalRev)}</div>
              <div style={{fontSize:11,color:"#444",marginTop:4}}>Total Revenue</div>
            </div>
            <div style={{...s.card,padding:16,textAlign:"center"}}>
              <div style={{...s.title,fontSize:18,color:"#34d399"}}>{fmt(totalRev-myComm)}</div>
              <div style={{fontSize:11,color:"#444",marginTop:4}}>To Professors</div>
            </div>
          </div>
          <div style={{...s.card,padding:18}}>
            <div style={{...s.title,fontSize:15,marginBottom:14}}>All Transactions</div>
            {confirmedEnroll.map(e=>{
              const c=courses.find(x=>x.id===e.course_id);
              return <div key={e.id} style={{padding:"12px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <div style={{fontWeight:600,fontSize:13}}>{e.student_name}</div>
                  <div style={{...s.title,fontWeight:700,color:"#a78bfa"}}>{fmt(Number(e.amount)*Number(e.commission_pct)/100)}</div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <div style={{fontSize:11,color:"#444"}}>{(c?.title||"Unknown").slice(0,28)}</div>
                  <div style={{fontSize:11,color:"#444"}}>{(e.created_at||"").split("T")[0]}</div>
                </div>
                {e.upi_ref&&<div style={{fontSize:10,color:"#333",marginTop:3}}>UPI: {e.upi_ref}</div>}
              </div>;
            })}
          </div>
        </>}

        {/* SETTINGS */}
        {adminTab==="settings" && <>
          <div style={{...s.card,padding:20,marginBottom:16}}>
            <div style={{...s.title,fontSize:16,marginBottom:16}}>⚙️ Commission Rate</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
              {[5,10,15,20,25,30].map(v=>(
                <button key={v} onClick={()=>{setCommission(v);showToast(`Commission: ${v}% ✅`);}} style={{flex:1,minWidth:60,background:commission===v?"linear-gradient(135deg,#7c3aed,#db2777)":"rgba(255,255,255,0.05)",border:commission===v?"none":"1px solid rgba(255,255,255,0.1)",color:commission===v?"#fff":"#555",borderRadius:12,padding:"10px",fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:14,cursor:"pointer"}}>{v}%</button>
              ))}
            </div>
            <div style={{background:"rgba(124,58,237,0.1)",border:"1px solid rgba(124,58,237,0.2)",borderRadius:14,padding:14,fontSize:13,color:"#a78bfa",lineHeight:1.8}}>
              On ₹1,000 course — You earn: <b style={{color:"#f472b6"}}>{fmt(1000*commission/100)}</b> | Prof gets: <b style={{color:"#34d399"}}>{fmt(1000-1000*commission/100)}</b>
            </div>
          </div>
          <div style={{...s.card,padding:20,marginBottom:16}}>
            <div style={{...s.title,fontSize:15,marginBottom:12}}>📊 Income Projection</div>
            {[10,50,100,500].map(n=>(
              <div key={n} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:13}}>
                <span style={{color:"#555"}}>{n} enrollments @ avg ₹1,200</span>
                <span style={{fontWeight:700,color:"#34d399"}}>{fmt(n*1200*commission/100)}</span>
              </div>
            ))}
          </div>
          <button style={s.btnPrimary} onClick={()=>{loadData();showToast("Data refreshed! 🔄");}}>🔄 Refresh Data</button>
        </>}
      </div>
      <Toast msg={toast}/>
    </div>
  );

  // ── PROFESSOR ───────────────────────────────────────────────────────────────
  if(view==="professor") return (
    <div style={s.page}>
      <div style={s.orb1}/>
      <div style={{...s.content,padding:"20px 20px 80px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
          <button style={{...s.btnSecondary,padding:"8px 12px",fontSize:12}} onClick={()=>setView("home")}>← Back</button>
          <div>
            <div style={{...s.title,fontSize:18}}>Professor Portal</div>
            <div style={{fontSize:11,color:"#444"}}>Submit your course</div>
          </div>
        </div>

        <div style={{display:"flex",gap:4,background:"rgba(255,255,255,0.03)",borderRadius:14,padding:4,marginBottom:20}}>
          {[["courses","📚 Courses"],["add","➕ Add Course"],["revenue","💰 Revenue"]].map(([id,label])=>(
            <button key={id} onClick={()=>setProfTab(id)} style={{flex:1,padding:"10px 4px",borderRadius:10,background:profTab===id?"rgba(124,58,237,0.2)":"none",border:"none",color:profTab===id?"#a78bfa":"#444",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:12,cursor:"pointer"}}>{label}</button>
          ))}
        </div>

        {profTab==="courses" && <>
          {loading && <div style={{textAlign:"center",padding:30}}><div className="spinner"/></div>}
          {courses.length===0&&!loading && <div style={{textAlign:"center",padding:"50px 20px",color:"#333"}}>
            <div style={{fontSize:48,marginBottom:12}}>📚</div>
            <div style={{fontWeight:600}}>No courses yet</div>
          </div>}
          {courses.map(c=>(
            <div key={c.id} style={{...s.card,padding:16,marginBottom:10,animation:"fadeUp 0.3s ease"}}>
              <div style={{display:"flex",gap:12,alignItems:"center"}}>
                <div style={{fontSize:28,background:"rgba(255,255,255,0.05)",borderRadius:12,width:50,height:50,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{c.thumbnail||"📚"}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,marginBottom:3}}>{c.title}</div>
                  <div style={{fontSize:11,color:"#444",marginBottom:6}}>{c.students||0} students • by {c.professor_name}</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{...s.chip,background:c.status==="approved"?"rgba(16,185,129,0.15)":"rgba(245,158,11,0.15)",color:c.status==="approved"?"#34d399":"#f59e0b"}}>{c.status}</span>
                    <span style={{...s.title,fontSize:15}}>{fmt(c.price)}</span>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </>}

        {profTab==="add" && <div style={{...s.card,padding:20}}>
          <div style={{...s.title,fontSize:16,marginBottom:20}}>📝 New Course</div>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div><label style={s.label}>YOUR NAME *</label><input style={s.input} placeholder="Professor name" value={newCourse.professor_name} onChange={e=>setNewCourse(p=>({...p,professor_name:e.target.value}))}/></div>
            <div><label style={s.label}>COURSE TITLE *</label><input style={s.input} placeholder="e.g. Complete Python Bootcamp" value={newCourse.title} onChange={e=>setNewCourse(p=>({...p,title:e.target.value}))}/></div>
            <div><label style={s.label}>DESCRIPTION</label><textarea style={{...s.input,resize:"none"}} placeholder="What will students learn?" rows={3} value={newCourse.description} onChange={e=>setNewCourse(p=>({...p,description:e.target.value}))}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={s.label}>CATEGORY</label><select style={s.input} value={newCourse.category} onChange={e=>setNewCourse(p=>({...p,category:e.target.value}))}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
              <div><label style={s.label}>LEVEL</label><select style={s.input} value={newCourse.level} onChange={e=>setNewCourse(p=>({...p,level:e.target.value}))}>{LEVELS.map(l=><option key={l}>{l}</option>)}</select></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={s.label}>PRICE (₹) *</label><input style={s.input} type="number" placeholder="999" value={newCourse.price} onChange={e=>setNewCourse(p=>({...p,price:e.target.value}))}/></div>
              <div><label style={s.label}>LESSONS</label><input style={s.input} type="number" placeholder="30" value={newCourse.lessons} onChange={e=>setNewCourse(p=>({...p,lessons:e.target.value}))}/></div>
            </div>
            {newCourse.price && <div style={{background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.2)",borderRadius:12,padding:12,fontSize:13,color:"#34d399"}}>
              Platform fee ({commission}%): {fmt(newCourse.price*commission/100)} &nbsp;|&nbsp; You earn: <b>{fmt(newCourse.price-newCourse.price*commission/100)}</b> per sale 🎉
            </div>}
            <div>
              <label style={s.label}>THUMBNAIL</label>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {THUMBS.map(e=><button key={e} onClick={()=>setNewCourse(p=>({...p,thumbnail:e}))} style={{fontSize:22,background:newCourse.thumbnail===e?"rgba(124,58,237,0.3)":"rgba(255,255,255,0.05)",border:newCourse.thumbnail===e?"2px solid #7c3aed":"1px solid rgba(255,255,255,0.1)",borderRadius:12,width:46,height:46,cursor:"pointer"}}>{e}</button>)}
              </div>
            </div>
            <button style={{...s.btnPrimary,marginTop:4}} onClick={submitCourse} disabled={loading}>
              {loading ? "Submitting..." : "Submit for Review →"}
            </button>
          </div>
        </div>}

        {profTab==="revenue" && <>
          <div style={{...s.card,padding:24,marginBottom:16,textAlign:"center"}}>
            <div style={{fontSize:11,color:"#444",fontWeight:700,letterSpacing:2,marginBottom:8}}>PROFESSOR REVENUE</div>
            <div style={{...s.title,fontSize:38,color:"#34d399"}}>{fmt(totalRev-myComm)}</div>
            <div style={{fontSize:12,color:"#444",marginTop:6}}>After {commission}% platform fee</div>
          </div>
          {courses.slice(0,6).map(c=>{
            const ces=enrollments.filter(e=>e.course_id===c.id&&e.payment_status==="confirmed");
            const rev=ces.reduce((s,e)=>s+Number(e.amount)*(1-Number(e.commission_pct)/100),0);
            return <div key={c.id} style={{...s.card,padding:14,marginBottom:10}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <div style={{fontSize:24}}>{c.thumbnail||"📚"}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13}}>{c.title}</div>
                  <div style={{fontSize:11,color:"#444"}}>{ces.length} paid enrollments</div>
                </div>
                <div style={{...s.title,color:"#34d399",fontSize:16}}>{fmt(rev)}</div>
              </div>
            </div>;
          })}
        </>}
      </div>
      <Toast msg={toast}/>
    </div>
  );

  // ── STUDENT ─────────────────────────────────────────────────────────────────
  if(view==="student") return (
    <div style={s.page}>
      <div style={s.orb1}/><div style={s.orb2}/>
      <div style={s.content}>
        {selectedCourse ? (
          <div style={{paddingBottom:80}}>
            <div style={{background:"linear-gradient(180deg,rgba(124,58,237,0.15) 0%,transparent 100%)",padding:"20px 20px 32px"}}>
              <button style={{...s.btnSecondary,padding:"8px 12px",fontSize:12,marginBottom:16}} onClick={()=>setSelectedCourse(null)}>← Back</button>
              <div style={{fontSize:58,marginBottom:14}}>{selectedCourse.thumbnail||"📚"}</div>
              <div style={{...s.title,fontSize:24,lineHeight:1.2,marginBottom:8}}>{selectedCourse.title}</div>
              <div style={{fontSize:13,color:"#555",marginBottom:10}}>by {selectedCourse.professor_name}</div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <Stars r={selectedCourse.rating}/>
                <span style={{...s.chip,background:"rgba(124,58,237,0.2)",color:"#a78bfa"}}>{selectedCourse.category}</span>
                <span style={{...s.chip,background:"rgba(255,255,255,0.05)",color:"#666"}}>{selectedCourse.level}</span>
              </div>
            </div>
            <div style={{padding:"0 20px"}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
                {[["📚",selectedCourse.lessons||0,"Lessons"],["⏱️",(selectedCourse.hours||0)+"h","Content"],["👥",selectedCourse.students||0,"Students"]].map(([i,v,l])=>(
                  <div key={l} style={{...s.card,padding:14,textAlign:"center"}}>
                    <div style={{fontSize:18,marginBottom:4}}>{i}</div>
                    <div style={{...s.title,fontSize:18,color:"#a78bfa"}}>{v}</div>
                    <div style={{fontSize:10,color:"#444"}}>{l}</div>
                  </div>
                ))}
              </div>
              {selectedCourse.description && <div style={{...s.card,padding:16,marginBottom:16}}>
                <div style={{...s.title,fontSize:14,marginBottom:8}}>About this course</div>
                <div style={{fontSize:13,color:"#666",lineHeight:1.7}}>{selectedCourse.description}</div>
              </div>}
              <div style={{...s.card,padding:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <div>
                    <div style={{...s.title,fontSize:32}}>{fmt(selectedCourse.price)}</div>
                    <div style={{fontSize:11,color:"#444",marginTop:2}}>One-time • Lifetime access</div>
                  </div>
                  <div style={{background:"rgba(16,185,129,0.15)",border:"1px solid rgba(16,185,129,0.2)",borderRadius:10,padding:"6px 12px",fontSize:11,color:"#34d399",fontWeight:700}}>✓ Verified</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
                  <input style={s.input} placeholder="Your full name *" value={studentInfo.name} onChange={e=>setStudentInfo(p=>({...p,name:e.target.value}))}/>
                  <input style={s.input} placeholder="Email address *" type="email" value={studentInfo.email} onChange={e=>setStudentInfo(p=>({...p,email:e.target.value}))}/>
                </div>
                <button style={s.btnPrimary} onClick={()=>{if(!studentInfo.name||!studentInfo.email)return showToast("Name & email required!");setPayModal(selectedCourse);}}>
                  Enroll Now — Pay via UPI ⚡
                </button>
                <div style={{textAlign:"center",fontSize:11,color:"#333",marginTop:10}}>🔒 Secure UPI payment • {UPI_ID}</div>
              </div>
            </div>
          </div>
        ) : (
          <>
            <div style={{background:"linear-gradient(180deg,rgba(13,8,32,1) 0%,rgba(6,6,16,1) 100%)",padding:"20px 20px 24px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div>
                  <button style={{...s.btnSecondary,padding:"6px 10px",fontSize:11,marginBottom:8}} onClick={()=>setView("home")}>← Home</button>
                  <div style={{...s.title,fontSize:20}}>Browse Courses</div>
                </div>
                <div style={{fontSize:12,color:"#444"}}>{filtered.length} courses</div>
              </div>
              <input style={{...s.input,marginBottom:12}} placeholder="🔍 Search courses..." value={searchQ} onChange={e=>setSearchQ(e.target.value)}/>
              <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
                {["All",...CATS].map(c=>(
                  <button key={c} onClick={()=>setFilterCat(c)} style={{background:filterCat===c?"linear-gradient(135deg,#7c3aed,#db2777)":"rgba(255,255,255,0.05)",border:"none",color:filterCat===c?"#fff":"#444",borderRadius:20,padding:"7px 14px",fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>{c}</button>
                ))}
              </div>
            </div>
            <div style={{padding:"16px 16px 80px"}}>
              {loading && [1,2,3].map(i=><div key={i} style={{...s.card,height:90,marginBottom:12,animation:"fadeUp 0.3s ease"}}/>)}
              {!loading&&filtered.length===0 && <div style={{textAlign:"center",padding:"50px 20px",color:"#333"}}>
                <div style={{fontSize:48,marginBottom:12}}>📭</div>
                <div style={{fontWeight:600,fontSize:16}}>No courses found</div>
              </div>}
              {filtered.map(c=>(
                <div key={c.id} style={{...s.card,padding:18,marginBottom:12,cursor:"pointer",transition:"all 0.3s",animation:"fadeUp 0.4s ease"}} onClick={()=>setSelectedCourse(c)}>
                  <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
                    <div style={{fontSize:32,background:"rgba(255,255,255,0.05)",borderRadius:14,width:58,height:58,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{c.thumbnail||"📚"}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:15,marginBottom:3,lineHeight:1.3}}>{c.title}</div>
                      <div style={{fontSize:12,color:"#555",marginBottom:8}}>{c.professor_name}</div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{display:"flex",gap:6,alignItems:"center"}}>
                          <span style={{...s.chip,background:"rgba(124,58,237,0.15)",color:"#a78bfa"}}>{c.category}</span>
                          <span style={{fontSize:11,color:"#444"}}>{c.students||0} students</span>
                        </div>
                        <div style={{...s.title,fontSize:18,background:"linear-gradient(135deg,#a78bfa,#f472b6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{fmt(c.price)}</div>
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>
      {payModal && <PayModal course={payModal} onClose={()=>setPayModal(null)} onSuccess={confirmEnrollment}/>}
      <Toast msg={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
