<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LearnVibe — Premium Learning Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Cabinet+Grotesk:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
<!-- Firebase -->

  import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDuJjcxkgxLlgVVl8H84ijsXsXMaX6DgWI",
    authDomain: "learnvibe-7cff1.firebaseapp.com",
    projectId: "learnvibe-7cff1",
    storageBucket: "learnvibe-7cff1.firebasestorage.app",
    messagingSenderId: "179716700849",
    appId: "1:179716700849:web:0bb466f7ec534b6ab00090",
    measurementId: "G-R3EXEGHM7J"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._db = db;
  window._firebase = { collection, addDoc, getDocs, updateDoc, doc, query, orderBy, onSnapshot };
  window.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05050a;
  --surface:#0e0e18;
  --surface2:#16162a;
  --border:rgba(255,255,255,0.07);
  --accent:#e8ff47;
  --accent2:#ff6b6b;
  --purple:#7c5cfc;
  --text:#ffffff;
  --muted:#666680;
}
body{background:var(--bg);font-family:'Cabinet Grotesk',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--purple);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.page{max-width:460px;margin:0 auto;min-height:100vh;position:relative}
.loader{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.15);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
.glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(20px);border:1px solid var(--border)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;animation:fadeUp 0.4s ease}
.card:hover{border-color:rgba(124,92,252,0.3);background:var(--surface2)}
.btn{border:none;font-family:'Cabinet Grotesk',sans-serif;font-weight:700;cursor:pointer;transition:all 0.2s;border-radius:12px;padding:13px 20px;font-size:15px}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#f0ff60;box-shadow:0 0 30px rgba(232,255,71,0.3)}
.btn-purple{background:var(--purple);color:#fff}
.btn-purple:hover{background:#9070ff;box-shadow:0 0 30px rgba(124,92,252,0.3)}
.btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{color:#fff;border-color:rgba(255,255,255,0.2)}
.btn-danger{background:rgba(255,107,107,0.15);border:1px solid rgba(255,107,107,0.3);color:var(--accent2)}
.input{background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:#fff;font-family:'Cabinet Grotesk',sans-serif;font-size:14px;padding:12px 14px;width:100%;outline:none;transition:all 0.2s}
.input:focus{border-color:var(--purple);background:rgba(124,92,252,0.08)}
.input::placeholder{color:var(--muted)}
select.input{appearance:none}
.chip{display:inline-block;border-radius:20px;font-size:11px;font-weight:700;padding:3px 10px;letter-spacing:0.5px}
.chip-green{background:rgba(100,255,150,0.1);color:#64ff96}
.chip-yellow{background:rgba(255,200,50,0.1);color:#ffc832}
.chip-red{background:rgba(255,107,107,0.1);color:#ff6b6b}
.chip-purple{background:rgba(124,92,252,0.15);color:#a78bfa}
.tab-bar{display:flex;gap:4px;background:rgba(255,255,255,0.03);border-radius:14px;padding:4px}
.tab{flex:1;background:none;border:none;color:var(--muted);font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:12px;cursor:pointer;padding:10px 4px;border-radius:10px;transition:all 0.2s}
.tab.active{background:var(--surface2);color:#fff;border:1px solid var(--border)}
.orb{position:fixed;pointer-events:none;border-radius:50%;filter:blur(80px);z-index:0;opacity:0.15}
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none}
.toast{background:var(--accent);color:#000;font-weight:800;font-size:13px;padding:10px 24px;border-radius:40px;white-space:nowrap;animation:fadeUp 0.3s ease;box-shadow:0 8px 30px rgba(232,255,71,0.3)}
</style>
</head>
<body>
<div class="page" id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px">
    <div class="loader" style="width:32px;height:32px"></div>
    <div style="color:var(--muted);font-size:14px">Loading LearnVibe...</div>
  </div>
</div>

<script>
const UPI_ID = "8421745350@axl";
const COMMISSION_DEFAULT = 20;
let db, FB;
let state = {
  view: "home",
  courses: [],
  enrollments: [],
  loading: false,
  commission: 20,
  adminTab: "dashboard",
  profTab: "courses",
  selectedCourse: null,
  payStep: null,
  payTxnId: null,
  studentName: "",
  studentEmail: "",
  upiRef: "",
  searchQ: "",
  filterCat: "All",
  newCourse: {title:"",desc:"",category:"Development",level:"Beginner",price:"",lessons:"",professor:"",thumb:"📚"},
  toast: "",
  toastTimer: null
};

const CATS = ["Development","Design","Business","Marketing","Finance","Photography","Music","Health"];
const LEVELS = ["Beginner","Intermediate","Advanced"];
const THUMBS = ["📚","🖥️","🎨","📈","📣","🎵","📷","💡","🔬","🏋️","✍️","🧠"];
const fmt = n => "₹" + Number(n||0).toLocaleString("en-IN");

function showToast(msg) {
  if(state.toastTimer) clearTimeout(state.toastTimer);
  state.toast = msg;
  render();
  state.toastTimer = setTimeout(() => { state.toast = ""; render(); }, 3000);
}

async function loadData() {
  if(!db) return;
  try {
    const [cs, es] = await Promise.all([
      FB.getDocs(FB.query(FB.collection(db,"courses"), FB.orderBy("createdAt","desc"))),
      FB.getDocs(FB.query(FB.collection(db,"enrollments"), FB.orderBy("createdAt","desc")))
    ]);
    state.courses = cs.docs.map(d => ({id:d.id,...d.data()}));
    state.enrollments = es.docs.map(d => ({id:d.id,...d.data()}));
    render();
  } catch(e) { showToast("Error: " + e.message); }
}

async function submitCourse() {
  const nc = state.newCourse;
  if(!nc.title||!nc.price||!nc.professor) return showToast("Sabhi * fields fill karo!");
  try {
    state.loading = true; render();
    await FB.addDoc(FB.collection(db,"courses"), {
      title:nc.title, description:nc.desc, category:nc.category,
      level:nc.level, price:Number(nc.price), lessons:Number(nc.lessons)||0,
      professor_name:nc.professor, thumbnail:nc.thumb,
      status:"pending", students:0, rating:0,
      createdAt: new Date().toISOString()
    });
    state.newCourse = {title:"",desc:"",category:"Development",level:"Beginner",price:"",lessons:"",professor:"",thumb:"📚"};
    showToast("Course submitted! Admin approve karega ✅");
    await loadData();
  } catch(e) { showToast("Error: "+e.message); }
  finally { state.loading = false; render(); }
}

async function approveCourse(id) {
  try {
    await FB.updateDoc(FB.doc(db,"courses",id), {status:"approved"});
    showToast("Approved! 🎉"); await loadData();
  } catch(e) { showToast("Error: "+e.message); }
}

async function rejectCourse(id) {
  try {
    await FB.updateDoc(FB.doc(db,"courses",id), {status:"rejected"});
    showToast("Rejected."); await loadData();
  } catch(e) { showToast("Error: "+e.message); }
}

async function confirmEnrollment() {
  if(!state.upiRef.trim()) return showToast("UPI reference daalo!");
  const c = state.selectedCourse;
  try {
    state.loading = true; render();
    await FB.addDoc(FB.collection(db,"enrollments"), {
      course_id: c.id,
      course_title: c.title,
      student_name: state.studentName,
      student_email: state.studentEmail,
      amount: c.price,
      commission_pct: state.commission,
      commission_amt: c.price * state.commission / 100,
      payment_status: "confirmed",
      upi_ref: state.upiRef,
      txn_id: state.payTxnId,
      createdAt: new Date().toISOString()
    });
    await FB.updateDoc(FB.doc(db,"courses",c.id), {students: (c.students||0)+1});
    state.payStep = null;
    state.studentName = "";
    state.studentEmail = "";
    state.upiRef = "";
    showToast("Enrolled! 🎓 Welcome to " + c.title.slice(0,20));
    await loadData();
    state.view = "student";
  } catch(e) { showToast("Error: "+e.message); }
  finally { state.loading = false; render(); }
}

// ── RENDER ENGINE ─────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  const approved = state.courses.filter(c=>c.status==="approved");
  const pending = state.courses.filter(c=>c.status==="pending");
  const confirmed = state.enrollments.filter(e=>e.payment_status==="confirmed");
  const totalRev = confirmed.reduce((s,e)=>s+Number(e.amount),0);
  const myComm = confirmed.reduce((s,e)=>s+(Number(e.amount)*Number(e.commission_pct||20)/100),0);
  const filtered = approved.filter(c => {
    const q = state.searchQ.toLowerCase();
    return (state.filterCat==="All"||c.category===state.filterCat) && (!q||c.title?.toLowerCase().includes(q)||c.professor_name?.toLowerCase().includes(q));
  });

  let html = `
    <div class="orb" style="width:400px;height:400px;top:-100px;left:-100px;background:radial-gradient(circle,#7c5cfc,transparent)"></div>
    <div class="orb" style="width:300px;height:300px;bottom:-50px;right:-50px;background:radial-gradient(circle,#e8ff47,transparent)"></div>
  `;

  if(state.payStep) {
    const c = state.selectedCourse;
    const upiUrl = `upi://pay?pa=${UPI_ID}&pn=LearnVibe&am=${c.price}&cu=INR&tr=${state.payTxnId}`;
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiUrl)}`;
    html += `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px">
      <div class="card" style="padding:28px;width:100%;max-width:380px;border-radius:24px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
          <div>
            <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px">Complete Payment</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">${c.title?.slice(0,30)}...</div>
          </div>
          <button class="btn btn-ghost" onclick="state.payStep=null;render()" style="padding:8px 12px;font-size:18px">×</button>
        </div>
        ${state.payStep==="qr" ? `
          <div style="background:#fff;border-radius:20px;padding:16px;text-align:center;margin-bottom:16px">
            <img src="${qrUrl}" alt="UPI QR" style="width:180px;height:180px;border-radius:12px"/>
            <div style="margin-top:10px;font-size:13px;font-weight:700;color:#111">Scan with any UPI app</div>
            <div style="font-size:12px;color:#666;margin-top:2px">${UPI_ID}</div>
          </div>
          <div style="background:rgba(232,255,71,0.08);border:1px solid rgba(232,255,71,0.2);border-radius:14px;padding:14px;margin-bottom:16px;text-align:center">
            <div style="font-size:11px;color:var(--accent);font-weight:700;margin-bottom:4px;letter-spacing:1px">AMOUNT TO PAY</div>
            <div style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800">${fmt(c.price)}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:4px">Txn ID: ${state.payTxnId}</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
            ${["PhonePe","GPay","Paytm","BHIM"].map(a=>`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center;font-size:12px;color:var(--muted)">📱 ${a}</div>`).join("")}
          </div>
          <button class="btn btn-primary" style="width:100%;padding:14px" onclick="state.payStep='verify';render()">I've Paid — Confirm ✓</button>
        ` : `
          <div style="text-align:center;margin-bottom:20px">
            <div style="font-size:52px;margin-bottom:8px">🎉</div>
            <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px">Almost Done!</div>
            <div style="font-size:13px;color:var(--muted)">Enter your UPI transaction reference</div>
          </div>
          <div style="margin-bottom:16px">
            <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:1px">UPI REFERENCE / UTR NUMBER</div>
            <input class="input" placeholder="e.g. 123456789012" value="${state.upiRef}" oninput="state.upiRef=this.value"/>
            <div style="font-size:11px;color:var(--muted);margin-top:6px">Find in UPI app → Payment History</div>
          </div>
          <button class="btn ${state.upiRef.trim()?"btn-purple":"btn-ghost"}" style="width:100%;padding:14px" onclick="confirmEnrollment()">
            ${state.loading?'<span class="loader"></span>':'Confirm Enrollment →'}
          </button>
        `}
      </div>
    </div>`;
  }

  // HOME
  if(state.view==="home") {
    html += `
    <div style="position:relative;z-index:1;padding:48px 20px 40px">
      <div style="text-align:center;margin-bottom:40px">
        <div style="display:inline-flex;align-items:center;gap:10px;margin-bottom:16px">
          <div style="width:48px;height:48px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 30px rgba(232,255,71,0.3)">⚡</div>
          <div style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:-1px">Learn<span style="color:var(--accent)">Vibe</span></div>
        </div>
        <div style="font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;font-weight:700">Premium Learning Platform</div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:32px">
        ${[[approved.length,"Courses","📚"],[confirmed.length,"Enrolled","👥"],[fmt(myComm),"Earned","💎"]].map(([v,l,i])=>`
          <div class="glass" style="border-radius:16px;padding:14px 10px;text-align:center">
            <div style="font-size:20px;margin-bottom:4px">${i}</div>
            <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--accent)">${v}</div>
            <div style="font-size:10px;color:var(--muted);font-weight:700;margin-top:2px">${l}</div>
          </div>
        `).join("")}
      </div>

      <div style="display:flex;flex-direction:column;gap:12px">
        <button class="btn btn-primary" style="width:100%;padding:18px;font-size:16px;display:flex;align-items:center;justify-content:space-between" onclick="state.view='admin';render()">
          <span style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">🛡️</span> Admin Dashboard</span>
          <span style="font-size:13px;opacity:0.7">My Earnings →</span>
        </button>
        <button class="btn btn-ghost" style="width:100%;padding:18px;font-size:15px;display:flex;align-items:center;justify-content:space-between;color:#fff" onclick="state.view='professor';render()">
          <span style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">🎓</span> Professor Portal</span>
          <span style="font-size:13px;color:var(--muted)">Add Course →</span>
        </button>
        <button class="btn btn-ghost" style="width:100%;padding:18px;font-size:15px;display:flex;align-items:center;justify-content:space-between;color:#fff" onclick="state.view='student';render()">
          <span style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">📖</span> Browse Courses</span>
          <span style="font-size:13px;color:var(--muted)">Explore →</span>
        </button>
      </div>
    </div>`;
  }

  // ADMIN
  else if(state.view==="admin") {
    html += `
    <div style="position:relative;z-index:1;padding:20px 20px 80px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="btn btn-ghost" style="padding:8px 12px;font-size:12px" onclick="state.view='home';render()">← Back</button>
          <div>
            <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800">Admin Panel</div>
            <div style="font-size:11px;color:var(--muted)">LearnVibe Owner</div>
          </div>
        </div>
        <div style="background:rgba(232,255,71,0.1);border:1px solid rgba(232,255,71,0.2);border-radius:12px;padding:8px 14px;text-align:center">
          <div style="font-size:9px;color:var(--accent);font-weight:700;letter-spacing:1px">COMMISSION</div>
          <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent)">${state.commission}%</div>
        </div>
      </div>

      <div class="tab-bar" style="margin-bottom:20px">
        ${[["dashboard","📊","Dashboard"],["courses","📚","Courses"],["earnings","💰","Earnings"],["settings","⚙️","Settings"]].map(([id,icon,label])=>`
          <button class="tab ${state.adminTab===id?"active":""}" onclick="state.adminTab='${id}';render()">${icon}<br/>${label}</button>
        `).join("")}
      </div>`;

    if(state.adminTab==="dashboard") {
      html += `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
          ${[[fmt(myComm),"My Commission","var(--accent)"],[fmt(totalRev-myComm),"Prof Revenue","#64ff96"],[approved.length+" Courses","Live","#60a5fa"],[pending.length+" Pending","Review","#ffc832"]].map(([v,l,c])=>`
            <div class="card" style="padding:18px;text-align:center">
              <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:${c};margin-bottom:4px">${v}</div>
              <div style="font-size:11px;color:var(--muted);font-weight:700">${l}</div>
            </div>
          `).join("")}
        </div>`;

      if(pending.length>0) {
        html += `
        <div class="card" style="padding:18px;margin-bottom:16px">
          <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px">
            ⏳ Pending Approval <span class="chip chip-yellow">${pending.length}</span>
          </div>
          ${pending.map(c=>`
            <div style="background:rgba(255,200,50,0.05);border:1px solid rgba(255,200,50,0.15);border-radius:14px;padding:14px;margin-bottom:8px">
              <div style="font-weight:700;font-size:14px;margin-bottom:2px">${c.title}</div>
              <div style="font-size:12px;color:var(--muted);margin-bottom:10px">by ${c.professor_name} • ${c.category} • ${fmt(c.price)}</div>
              <div style="display:flex;gap:8px">
                <button class="btn btn-primary" style="flex:1;padding:10px;font-size:13px" onclick="approveCourse('${c.id}')">✓ Approve</button>
                <button class="btn btn-danger" style="flex:1;padding:10px;font-size:13px" onclick="rejectCourse('${c.id}')">✗ Reject</button>
              </div>
            </div>
          `).join("")}
        </div>`;
      }

      html += `
        <div class="card" style="padding:18px">
          <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;margin-bottom:14px">💳 Recent Transactions</div>
          ${confirmed.length===0?`<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">No transactions yet</div>`
          :confirmed.slice(0,8).map(e=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
              <div>
                <div style="font-weight:600;font-size:13px">${e.student_name}</div>
                <div style="font-size:11px;color:var(--muted);margin-top:2px">${(e.course_title||"").slice(0,25)} • ${e.upi_ref||""}</div>
              </div>
              <div style="text-align:right">
                <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--accent)">+${fmt(Number(e.amount)*Number(e.commission_pct||20)/100)}</div>
                <div style="font-size:10px;color:var(--muted)">${e.commission_pct||20}% comm</div>
              </div>
            </div>
          `).join("")}
        </div>`;
    }

    else if(state.adminTab==="courses") {
      html += `<div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:14px">All Courses (${state.courses.length})</div>`;
      html += state.courses.map(c=>`
        <div class="card" style="padding:16px;margin-bottom:10px">
          <div style="display:flex;gap:12px">
            <div style="font-size:28px;background:var(--surface2);border-radius:12px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${c.thumbnail||"📚"}</div>
            <div style="flex:1">
              <div style="font-weight:700;font-size:14px;margin-bottom:3px">${c.title}</div>
              <div style="font-size:11px;color:var(--muted);margin-bottom:6px">by ${c.professor_name}</div>
              <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
                <span class="chip ${c.status==="approved"?"chip-green":c.status==="pending"?"chip-yellow":"chip-red"}">${c.status}</span>
                <span class="chip chip-purple">${c.category}</span>
                <span style="margin-left:auto;font-family:'Syne',sans-serif;font-weight:800">${fmt(c.price)}</span>
              </div>
              ${c.status==="pending"?`
                <div style="display:flex;gap:8px;margin-top:10px">
                  <button class="btn btn-primary" style="flex:1;padding:8px;font-size:12px" onclick="approveCourse('${c.id}')">✓ Approve</button>
                  <button class="btn btn-danger" style="flex:1;padding:8px;font-size:12px" onclick="rejectCourse('${c.id}')">✗ Reject</button>
                </div>`:""}
            </div>
          </div>
        </div>
      `).join("");
    }

    else if(state.adminTab==="earnings") {
      html += `
        <div class="card" style="padding:24px;margin-bottom:16px;text-align:center;background:linear-gradient(135deg,rgba(232,255,71,0.08),rgba(124,92,252,0.08));border-color:rgba(232,255,71,0.2)">
          <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:2px;margin-bottom:8px">TOTAL COMMISSION EARNED</div>
          <div style="font-family:'Syne',sans-serif;font-size:44px;font-weight:800;color:var(--accent)">${fmt(myComm)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px">from ${confirmed.length} confirmed enrollments</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
          <div class="card" style="padding:16px;text-align:center">
            <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800">${fmt(totalRev)}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:4px">Total Revenue</div>
          </div>
          <div class="card" style="padding:16px;text-align:center">
            <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#64ff96">${fmt(totalRev-myComm)}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:4px">To Professors</div>
          </div>
        </div>
        <div class="card" style="padding:18px">
          <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;margin-bottom:14px">All Transactions</div>
          ${confirmed.map(e=>`
            <div style="padding:12px 0;border-bottom:1px solid var(--border)">
              <div style="display:flex;justify-content:space-between;margin-bottom:3px">
                <div style="font-weight:600;font-size:13px">${e.student_name}</div>
                <div style="font-family:'Syne',sans-serif;font-weight:800;color:var(--accent)">${fmt(Number(e.amount)*Number(e.commission_pct||20)/100)}</div>
              </div>
              <div style="display:flex;justify-content:space-between">
                <div style="font-size:11px;color:var(--muted)">${(e.course_title||"").slice(0,28)}</div>
                <div style="font-size:11px;color:var(--muted)">${(e.createdAt||"").split("T")[0]}</div>
              </div>
              ${e.upi_ref?`<div style="font-size:10px;color:#444;margin-top:3px">UPI: ${e.upi_ref}</div>`:""}
            </div>
          `).join("")}
        </div>`;
    }

    else if(state.adminTab==="settings") {
      html += `
        <div class="card" style="padding:20px;margin-bottom:16px">
          <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:16px">⚙️ Commission Rate</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
            ${[5,10,15,20,25,30].map(v=>`
              <button onclick="state.commission=${v};showToast('Commission: ${v}% ✅');render()" style="flex:1;min-width:60px;background:${state.commission===v?"var(--accent)":"var(--surface2)"};border:${state.commission===v?"none":"1px solid var(--border)"};color:${state.commission===v?"#000":"var(--muted)"};border-radius:12px;padding:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;cursor:pointer">${v}%</button>
            `).join("")}
          </div>
          <div style="background:rgba(232,255,71,0.06);border:1px solid rgba(232,255,71,0.15);border-radius:14px;padding:14px;font-size:13px;color:var(--accent);line-height:1.8">
            On ₹1,000 course — You earn: <b>${fmt(1000*state.commission/100)}</b> | Prof gets: <b>${fmt(1000-1000*state.commission/100)}</b>
          </div>
        </div>
        <div class="card" style="padding:20px;margin-bottom:16px">
          <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;margin-bottom:12px">📊 Income Projection</div>
          ${[10,50,100,500].map(n=>`
            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
              <span style="color:var(--muted)">${n} enrollments @ avg ₹1,200</span>
              <span style="font-weight:700;color:#64ff96">${fmt(n*1200*state.commission/100)}</span>
            </div>
          `).join("")}
        </div>
        <button class="btn btn-purple" style="width:100%;padding:14px" onclick="loadData();showToast('Refreshed! 🔄')">🔄 Refresh Data</button>`;
    }

    html += `</div>`;
  }

  // PROFESSOR
  else if(state.view==="professor") {
    html += `
    <div style="position:relative;z-index:1;padding:20px 20px 80px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <button class="btn btn-ghost" style="padding:8px 12px;font-size:12px" onclick="state.view='home';render()">← Back</button>
        <div>
          <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800">Professor Portal</div>
          <div style="font-size:11px;color:var(--muted)">Submit your course</div>
        </div>
      </div>

      <div class="tab-bar" style="margin-bottom:20px">
        ${[["courses","📚 Courses"],["add","➕ Add"],["revenue","💰 Revenue"]].map(([id,label])=>`
          <button class="tab ${state.profTab===id?"active":""}" onclick="state.profTab='${id}';render()">${label}</button>
        `).join("")}
      </div>`;

    if(state.profTab==="courses") {
      html += state.courses.length===0?`<div style="text-align:center;padding:50px;color:var(--muted)"><div style="font-size:48px;margin-bottom:12px">📚</div><div style="font-weight:700">No courses yet</div></div>`
      :state.courses.map(c=>`
        <div class="card" style="padding:16px;margin-bottom:10px">
          <div style="display:flex;gap:12px;align-items:center">
            <div style="font-size:28px;background:var(--surface2);border-radius:12px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${c.thumbnail||"📚"}</div>
            <div style="flex:1">
              <div style="font-weight:700;font-size:14px;margin-bottom:3px">${c.title}</div>
              <div style="font-size:11px;color:var(--muted);margin-bottom:6px">${c.students||0} students • by ${c.professor_name}</div>
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span class="chip ${c.status==="approved"?"chip-green":"chip-yellow"}">${c.status}</span>
                <span style="font-family:'Syne',sans-serif;font-weight:800">${fmt(c.price)}</span>
              </div>
            </div>
          </div>
        </div>
      `).join("");
    }

    else if(state.profTab==="add") {
      const nc = state.newCourse;
      html += `
        <div class="card" style="padding:20px">
          <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:20px">📝 New Course</div>
          <div style="display:flex;flex-direction:column;gap:14px">
            <div><div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:1px">YOUR NAME *</div>
              <input class="input" placeholder="Professor name" value="${nc.professor}" oninput="state.newCourse.professor=this.value"/></div>
            <div><div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:1px">COURSE TITLE *</div>
              <input class="input" placeholder="e.g. Complete Python Bootcamp" value="${nc.title}" oninput="state.newCourse.title=this.value"/></div>
            <div><div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:1px">DESCRIPTION</div>
              <textarea class="input" placeholder="What will students learn?" rows="3" style="resize:none" oninput="state.newCourse.desc=this.value">${nc.desc}</textarea></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
              <div><div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:1px">CATEGORY</div>
                <select class="input" onchange="state.newCourse.category=this.value">${CATS.map(c=>`<option ${nc.category===c?"selected":""}>${c}</option>`).join("")}</select></div>
              <div><div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:1px">LEVEL</div>
                <select class="input" onchange="state.newCourse.level=this.value">${LEVELS.map(l=>`<option ${nc.level===l?"selected":""}>${l}</option>`).join("")}</select></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
              <div><div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:1px">PRICE (₹) *</div>
                <input class="input" type="number" placeholder="999" value="${nc.price}" oninput="state.newCourse.price=this.value"/></div>
              <div><div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:1px">LESSONS</div>
                <input class="input" type="number" placeholder="30" value="${nc.lessons}" oninput="state.newCourse.lessons=this.value"/></div>
            </div>
            ${nc.price?`<div style="background:rgba(100,255,150,0.06);border:1px solid rgba(100,255,150,0.15);border-radius:12px;padding:12px;font-size:13px;color:#64ff96">Platform fee (${state.commission}%): ${fmt(nc.price*state.commission/100)} | You earn: <b>${fmt(nc.price-nc.price*state.commission/100)}</b> per sale 🎉</div>`:""}
            <div><div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:1px">THUMBNAIL</div>
              <div style="display:flex;gap:8px;flex-wrap:wrap">${THUMBS.map(t=>`<button onclick="state.newCourse.thumb='${t}';render()" style="font-size:22px;background:${nc.thumb===t?"rgba(124,92,252,0.3)":"var(--surface2)"};border:${nc.thumb===t?"2px solid var(--purple)":"1px solid var(--border)"};border-radius:12px;width:46px;height:46px;cursor:pointer">${t}</button>`).join("")}</div></div>
            <button class="btn btn-primary" style="width:100%;padding:15px;margin-top:4px" onclick="submitCourse()">
              ${state.loading?'<span class="loader"></span>':'Submit for Review →'}
            </button>
          </div>
        </div>`;
    }

    else if(state.profTab==="revenue") {
      const profRev = totalRev - myComm;
      html += `
        <div class="card" style="padding:24px;margin-bottom:16px;text-align:center">
          <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:2px;margin-bottom:8px">PROFESSOR REVENUE</div>
          <div style="font-family:'Syne',sans-serif;font-size:38px;font-weight:800;color:#64ff96">${fmt(profRev)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px">After ${state.commission}% platform fee</div>
        </div>
        ${state.courses.map(c=>{
          const ces = state.enrollments.filter(e=>e.course_id===c.id&&e.payment_status==="confirmed");
          const rev = ces.reduce((s,e)=>s+Number(e.amount)*(1-Number(e.commission_pct||20)/100),0);
          return `<div class="card" style="padding:14px;margin-bottom:10px">
            <div style="display:flex;gap:10px;align-items:center">
              <div style="font-size:24px">${c.thumbnail||"📚"}</div>
              <div style="flex:1"><div style="font-weight:700;font-size:13px">${c.title}</div><div style="font-size:11px;color:var(--muted)">${ces.length} paid enrollments</div></div>
              <div style="font-family:'Syne',sans-serif;font-weight:800;color:#64ff96;font-size:16px">${fmt(rev)}</div>
            </div>
          </div>`;
        }).join("")}`;
    }
    html += `</div>`;
  }

  // STUDENT
  else if(state.view==="student") {
    if(state.selectedCourse) {
      const c = state.selectedCourse;
      html += `
        <div style="position:relative;z-index:1;padding-bottom:80px">
          <div style="background:linear-gradient(180deg,rgba(124,92,252,0.12) 0%,transparent 100%);padding:20px 20px 32px">
            <button class="btn btn-ghost" style="padding:8px 12px;font-size:12px;margin-bottom:16px" onclick="state.selectedCourse=null;render()">← Back</button>
            <div style="font-size:56px;margin-bottom:14px">${c.thumbnail||"📚"}</div>
            <div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1.2;margin-bottom:8px">${c.title}</div>
            <div style="font-size:13px;color:var(--muted);margin-bottom:10px">by ${c.professor_name}</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <span class="chip chip-purple">${c.category}</span>
              <span class="chip" style="background:var(--surface2);color:var(--muted)">${c.level}</span>
              <span style="font-size:11px;color:var(--muted);padding:3px 0">${c.students||0} students</span>
            </div>
          </div>
          <div style="padding:0 20px">
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
              ${[["📚",c.lessons||0,"Lessons"],["👥",c.students||0,"Students"],["⭐",c.rating||"New","Rating"]].map(([i,v,l])=>`
                <div class="card" style="padding:14px;text-align:center">
                  <div style="font-size:18px;margin-bottom:4px">${i}</div>
                  <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--accent)">${v}</div>
                  <div style="font-size:10px;color:var(--muted)">${l}</div>
                </div>
              `).join("")}
            </div>
            ${c.description?`<div class="card" style="padding:16px;margin-bottom:16px"><div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:800;margin-bottom:8px">About this course</div><div style="font-size:13px;color:var(--muted);line-height:1.7">${c.description}</div></div>`:""}
            <div class="card" style="padding:20px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                <div>
                  <div style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800">${fmt(c.price)}</div>
                  <div style="font-size:11px;color:var(--muted);margin-top:2px">One-time • Lifetime access</div>
                </div>
                <div style="background:rgba(100,255,150,0.1);border:1px solid rgba(100,255,150,0.2);border-radius:10px;padding:6px 12px;font-size:11px;color:#64ff96;font-weight:700">✓ Verified</div>
              </div>
              <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
                <input class="input" placeholder="Your full name *" value="${state.studentName}" oninput="state.studentName=this.value"/>
                <input class="input" placeholder="Email address *" type="email" value="${state.studentEmail}" oninput="state.studentEmail=this.value"/>
              </div>
              <button class="btn btn-primary" style="width:100%;padding:16px;font-size:16px" onclick="if(!state.studentName||!state.studentEmail){showToast('Name & email required!');return;}state.payStep='qr';state.payTxnId='LV'+Date.now().toString(36).toUpperCase();render()">
                Enroll Now — Pay via UPI ⚡
              </button>
              <div style="text-align:center;font-size:11px;color:var(--muted);margin-top:10px">🔒 Secure UPI • ${UPI_ID}</div>
            </div>
          </div>
        </div>`;
    } else {
      html += `
        <div style="position:relative;z-index:1">
          <div style="background:linear-gradient(180deg,rgba(5,5,10,1) 0%,rgba(5,5,10,1) 100%);padding:20px 20px 24px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
              <div>
                <button class="btn btn-ghost" style="padding:6px 10px;font-size:11px;margin-bottom:8px" onclick="state.view='home';render()">← Home</button>
                <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800">Browse Courses</div>
              </div>
              <div style="font-size:12px;color:var(--muted)">${filtered.length} courses</div>
            </div>
            <input class="input" placeholder="🔍 Search courses..." value="${state.searchQ}" oninput="state.searchQ=this.value;render()" style="margin-bottom:12px"/>
            <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px">
              ${["All",...CATS].map(c=>`<button onclick="state.filterCat='${c}';render()" style="background:${state.filterCat===c?"var(--accent)":"var(--surface2)"};border:none;color:${state.filterCat===c?"#000":"var(--muted)"};border-radius:20px;padding:7px 14px;font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap">${c}</button>`).join("")}
            </div>
          </div>
          <div style="padding:16px 16px 80px">
            ${filtered.length===0?`<div style="text-align:center;padding:50px;color:var(--muted)"><div style="font-size:48px;margin-bottom:12px">📭</div><div style="font-weight:600;font-size:16px">No courses found</div></div>`
            :filtered.map(c=>`
              <div class="card" style="padding:18px;margin-bottom:12px;cursor:pointer" onclick="state.selectedCourse=${JSON.stringify(c).replace(/"/g,"'")};render()">
                <div style="display:flex;gap:14px;align-items:flex-start">
                  <div style="font-size:32px;background:var(--surface2);border-radius:14px;width:58px;height:58px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${c.thumbnail||"📚"}</div>
                  <div style="flex:1">
                    <div style="font-weight:700;font-size:15px;margin-bottom:3px;line-height:1.3">${c.title}</div>
                    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${c.professor_name}</div>
                    <div style="display:flex;justify-content:space-between;align-items:center">
                      <div style="display:flex;gap:6px;align-items:center">
                        <span class="chip chip-purple">${c.category}</span>
                        <span style="font-size:11px;color:var(--muted)">${c.students||0} students</span>
                      </div>
                      <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--accent)">${fmt(c.price)}</div>
                    </div>
                  </div>
                </div>
              </div>
            `).join("")}
          </div>
        </div>`;
    }
  }

  html += state.toast ? `<div class="toast-wrap"><div class="toast">${state.toast}</div></div>` : "";
  app.innerHTML = html;
}

window.addEventListener('firebase-ready', () => {
  db = window._db;
  FB = window._firebase;
  loadData();
});

render();
</script>
</body>
</html>
